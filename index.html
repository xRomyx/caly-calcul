<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Les Jeux de Caly 🦄</title>
  <!-- PWA -->
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#b36bff" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Jeux de Caly" />
  <link rel="apple-touch-icon" href="icon.svg" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --pink:   #ff6fb3;
      --purple: #b36bff;
      --blue:   #6bbfff;
      --yellow: #ffe066;
      --green:  #6bffb3;
      --bg:     #1a0533;
      --card:   rgba(255,255,255,0.07);
      --white:  #fff;
      --radius: 24px;
    }

    body {
      font-family: 'Nunito', sans-serif;
      background: var(--bg);
      min-height: 100dvh;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
      padding: 16px;
      padding-bottom: max(16px, env(safe-area-inset-bottom));
    }

    #stars { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
    .star {
      position: absolute;
      background: white;
      border-radius: 50%;
      animation: twinkle var(--d) ease-in-out infinite alternate;
      opacity: 0;
    }
    @keyframes twinkle { to { opacity: 1; } }

    .floatie {
      position: fixed;
      font-size: 2rem;
      animation: float var(--fd) ease-in-out infinite alternate;
      pointer-events: none;
      z-index: 0;
      opacity: 0.35;
    }
    @keyframes float {
      from { transform: translateY(0) rotate(-5deg); }
      to   { transform: translateY(-20px) rotate(5deg); }
    }

    #app {
      position: relative; z-index: 1;
      width: 100%; max-width: 520px;
    }

    .screen { display: none; flex-direction: column; align-items: center; gap: 20px; }
    .screen.active { display: flex; }

    .title {
      font-size: clamp(2rem, 6vw, 3rem);
      font-weight: 900;
      background: linear-gradient(135deg, var(--pink), var(--purple), var(--blue));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-align: center;
      line-height: 1.2;
      filter: drop-shadow(0 0 12px rgba(179,107,255,0.6));
    }

    .subtitle {
      color: rgba(255,255,255,0.7);
      font-size: 1.1rem;
      text-align: center;
    }

    .btn-group { display: flex; flex-direction: column; gap: 14px; width: 100%; }
    .op-btn {
      border: none; border-radius: var(--radius);
      padding: 18px 24px;
      font-family: 'Nunito', sans-serif;
      font-size: 1.3rem;
      font-weight: 900;
      cursor: pointer;
      display: flex; align-items: center; gap: 14px;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 6px 20px rgba(0,0,0,0.3);
    }
    .op-btn:hover  { transform: translateY(-3px) scale(1.02); box-shadow: 0 10px 28px rgba(0,0,0,0.4); }
    .op-btn:active { transform: scale(0.97); }
    .op-btn.add  { background: linear-gradient(135deg, #ff6fb3, #ff9de0); color: #5a0030; }
    .op-btn.sub  { background: linear-gradient(135deg, #b36bff, #d09fff); color: #2a005a; }
    .op-btn.mul  { background: linear-gradient(135deg, #6bbfff, #a8d8ff); color: #002a5a; }
    .op-icon { font-size: 1.8rem; }
    .op-label { flex: 1; }
    .op-sym { font-size: 1.5rem; opacity: 0.8; }

    .score-bar {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--card);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 50px;
      padding: 10px 20px;
      color: white;
      font-weight: 700;
      font-size: 1rem;
    }
    .score-bar .stars { font-size: 1.3rem; letter-spacing: 2px; }

    .problem-card {
      background: var(--card);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: var(--radius);
      padding: 32px 24px;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      backdrop-filter: blur(8px);
    }

    .op-badge {
      padding: 6px 18px;
      border-radius: 50px;
      font-weight: 900;
      font-size: 0.9rem;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    .op-badge.add { background: #ff6fb333; color: #ffb3d9; border: 1px solid #ff6fb355; }
    .op-badge.sub { background: #b36bff33; color: #d9b3ff; border: 1px solid #b36bff55; }
    .op-badge.mul { background: #6bbfff33; color: #b3d9ff; border: 1px solid #6bbfff55; }

    .problem-text {
      font-size: clamp(2.8rem, 9vw, 4.5rem);
      font-weight: 900;
      color: white;
      letter-spacing: 4px;
      text-align: center;
      text-shadow: 0 0 20px rgba(255,255,255,0.3);
    }

    .question-mark { color: var(--yellow); animation: pulse 0.8s ease-in-out infinite alternate; }
    @keyframes pulse { to { text-shadow: 0 0 20px var(--yellow); } }

    #answer-input {
      width: 100%;
      background: rgba(255,255,255,0.1);
      border: 2px solid rgba(255,255,255,0.25);
      border-radius: var(--radius);
      color: white;
      font-family: 'Nunito', sans-serif;
      font-size: 1.8rem;
      font-weight: 900;
      text-align: center;
      padding: 12px;
      outline: none;
      transition: border-color 0.2s;
    }
    #answer-input:focus { border-color: var(--purple); box-shadow: 0 0 0 3px rgba(179,107,255,0.3); }
    #answer-input.correct { border-color: var(--green); box-shadow: 0 0 0 3px rgba(107,255,179,0.3); }
    #answer-input.wrong   { border-color: var(--pink);  box-shadow: 0 0 0 3px rgba(255,107,179,0.3); animation: shake 0.4s; }

    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%     { transform: translateX(-8px); }
      40%     { transform: translateX(8px); }
      60%     { transform: translateX(-6px); }
      80%     { transform: translateX(6px); }
    }

#feedback {
      font-size: 1.4rem;
      font-weight: 900;
      min-height: 40px;
      text-align: center;
      transition: all 0.3s;
    }
    #feedback.correct { color: var(--green); }
    #feedback.wrong   { color: var(--pink); }

    .keypad {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      width: 100%;
      max-width: 280px;
    }
    .key {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 16px;
      color: white;
      font-family: 'Nunito', sans-serif;
      font-size: 1.4rem;
      font-weight: 700;
      padding: 14px;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      text-align: center;
    }
    .key:hover  { background: rgba(255,255,255,0.18); }
    .key:active { transform: scale(0.9); }
    .key.del { background: rgba(255,107,179,0.15); border-color: rgba(255,107,179,0.3); }
    .key.ok  { background: linear-gradient(135deg, var(--green), #00b87a); color: #003322; border: none; font-size: 1.3rem; font-weight: 900; }

    .back-btn {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 50px;
      color: rgba(255,255,255,0.6);
      font-family: 'Nunito', sans-serif;
      font-size: 0.95rem;
      font-weight: 700;
      padding: 8px 20px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .back-btn:hover { background: rgba(255,255,255,0.15); color: white; }

    .dots { display: flex; gap: 8px; }
    .dot {
      width: 22px; height: 22px;
      border-radius: 50%;
      background: rgba(255,255,255,0.15);
      transition: background 0.3s;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.75rem; font-weight: 900; color: transparent;
    }
    .dot.done    { background: var(--green);  color: #003322; }
    .dot.current { background: var(--yellow); }
    .dot.wrong-d { background: var(--pink);   }

    .result-emoji { font-size: 5rem; animation: bounceIn 0.6s cubic-bezier(0.36,0.07,0.19,0.97); }
    @keyframes bounceIn {
      0%   { transform: scale(0); opacity: 0; }
      60%  { transform: scale(1.2); }
      100% { transform: scale(1); opacity: 1; }
    }
    .result-title {
      font-size: clamp(1.8rem, 5vw, 2.4rem);
      font-weight: 900;
      text-align: center;
      background: linear-gradient(135deg, var(--yellow), var(--pink));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .result-score { font-size: 1.1rem; color: rgba(255,255,255,0.6); text-align: center; }
    .star-row {
      font-size: 4rem;
      font-weight: 900;
      letter-spacing: 6px;
      background: linear-gradient(135deg, var(--yellow), var(--green));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 0 12px rgba(255,224,102,0.5));
    }

    .replay-btn {
      background: linear-gradient(135deg, var(--green), #00b87a);
      border: none; border-radius: var(--radius);
      color: #003322;
      font-family: 'Nunito', sans-serif;
      font-size: 1.2rem; font-weight: 900;
      padding: 16px 36px;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 6px 20px rgba(107,255,179,0.3);
    }
    .replay-btn:hover { transform: translateY(-2px) scale(1.03); }

    .confetti-piece {
      position: fixed;
      width: 10px; height: 10px;
      top: -20px;
      border-radius: 2px;
      animation: confetti-fall var(--ct) linear forwards;
      pointer-events: none;
      z-index: 999;
    }
    @keyframes confetti-fall {
      to { transform: translateY(110vh) rotate(720deg); opacity: 0; }
    }

    /* ===== LECTURE ===== */
    .op-btn.lec { background: linear-gradient(135deg, #ffb347, #ffdd88); color: #4a2800; }

    .lecture-card {
      background: var(--card);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: var(--radius);
      padding: 32px 24px;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      backdrop-filter: blur(8px);
    }

    .lecture-legende {
      display: flex;
      gap: 20px;
      justify-content: center;
      font-size: 0.85rem;
      color: rgba(255,255,255,0.6);
      flex-wrap: wrap;
    }
    .lecture-legende span { display: flex; align-items: center; gap: 8px; }
    .leg-arc {
      display: inline-block;
      width: 30px; height: 10px;
      border: 2.5px solid var(--pink);
      border-top: none;
      border-radius: 0 0 15px 15px;
    }
    .leg-muette {
      display: inline-block;
      width: 18px; height: 18px;
      background: rgba(255,255,255,0.2);
      border-radius: 4px;
      position: relative;
    }
    .leg-muette::after {
      content: '';
      position: absolute;
      top: 46%; left: 1px; right: 1px;
      height: 2.5px;
      background: rgba(255,107,179,0.9);
      border-radius: 2px;
    }

    .mot-display {
      display: flex;
      align-items: flex-end;
      justify-content: center;
      flex-wrap: wrap;
      min-height: 90px;
      animation: slideInMot 0.35s ease;
    }
    @keyframes slideInMot {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .lettre {
      display: inline-flex;
      align-items: flex-end;
      justify-content: center;
      font-size: clamp(2.6rem, 9vw, 4rem);
      font-weight: 900;
      color: white;
      position: relative;
      padding: 0 2px 22px;
      line-height: 1;
    }
    /* Couleurs par syllabe */
    .lettre.s1 { color: var(--pink); }
    .lettre.s2 { color: var(--blue); }
    .lettre.s3 { color: var(--yellow); }
    /* Arcs de la même couleur que la syllabe */
    .lettre.arc::after {
      content: '';
      position: absolute;
      bottom: 4px;
      left: 1px; right: 1px;
      height: 13px;
      border: 3px solid currentColor;
      border-top: none;
      border-radius: 0 0 50px 50px;
    }
    /* Lettre muette : juste grisée */
    .lettre.muette { color: rgba(255,255,255,0.28) !important; }

    .lecture-tip {
      font-size: 1rem;
      color: rgba(255,255,255,0.8);
      text-align: center;
      line-height: 1.6;
      padding: 12px 16px;
      background: rgba(255,255,255,0.06);
      border-radius: 16px;
      width: 100%;
    }

    .lec-progress { font-size: 1rem; color: rgba(255,255,255,0.5); font-weight: 700; }

    .lu-btn {
      background: linear-gradient(135deg, var(--purple), var(--pink));
      border: none; border-radius: var(--radius);
      color: white;
      font-family: 'Nunito', sans-serif;
      font-size: 1.3rem; font-weight: 900;
      padding: 16px 40px;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 6px 20px rgba(179,107,255,0.4);
    }
    .lu-btn:hover  { transform: translateY(-2px) scale(1.03); }
    .lu-btn:active { transform: scale(0.97); }

    .listen-btn {
      background: rgba(255,255,255,0.08);
      border: 1.5px solid rgba(255,255,255,0.2);
      border-radius: 50px;
      color: rgba(255,255,255,0.75);
      font-family: 'Nunito', sans-serif;
      font-size: 1.05rem;
      font-weight: 700;
      padding: 10px 28px;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }
    .listen-btn:hover  { background: rgba(255,255,255,0.18); color: white; }
    .listen-btn:active { transform: scale(0.94); }

    /* ===== MOBILE ===== */
    @media (max-width: 480px) {
      body {
        padding: 10px;
        padding-bottom: max(10px, env(safe-area-inset-bottom));
        justify-content: space-evenly;
      }
      .btn-group { gap: 8px; }

      .title { font-size: clamp(1.8rem, 8vw, 2.4rem); }

      .score-bar { padding: 8px 14px; font-size: 0.9rem; }
      .lec-progress { font-size: 0.8rem; }

      .problem-card,
      .lecture-card { padding: 18px 14px; gap: 14px; }

      .problem-text { font-size: clamp(2.2rem, 10vw, 3.5rem); }

      .lecture-legende {
        font-size: 0.75rem;
        gap: 10px;
        justify-content: flex-start;
      }

      .lettre { font-size: clamp(2.2rem, 11vw, 3.5rem); padding-bottom: 20px; }

      .keypad { gap: 8px; max-width: 260px; }
      .key { padding: 12px; font-size: 1.3rem; }

      .exo-btns { gap: 12px; }
      .exo-btn  { width: 80px; height: 80px; font-size: 2.2rem; }

      .op-btn { padding: 15px 18px; font-size: 1.15rem; }

      .lu-btn, .replay-btn { padding: 14px 30px; font-size: 1.1rem; }

      .result-emoji { font-size: 4rem; }
      .star-row     { font-size: 3rem; }
    }

    /* ===== DEVOIRS ===== */
    .op-btn.dev { background: linear-gradient(135deg, #6be8ff, #0099cc); color: #002233; }
    .parent-unlock {
      background: transparent;
      border: none;
      color: rgba(255,255,255,0.18);
      font-family: 'Nunito', sans-serif;
      font-size: 0.85rem;
      font-weight: 700;
      padding: 10px 20px;
      cursor: pointer;
      transition: color 0.2s;
      letter-spacing: 1px;
    }
    .parent-unlock:hover { color: rgba(255,255,255,0.5); }

    /* PIN */
    .pin-dots { display: flex; gap: 18px; justify-content: center; }
    .pin-dot {
      width: 20px; height: 20px;
      border-radius: 50%;
      border: 2.5px solid rgba(255,255,255,0.3);
      transition: all 0.18s;
    }
    .pin-dot.filled { background: var(--purple); border-color: var(--purple); transform: scale(1.2); }
    #pin-error { min-height: 30px; text-align: center; color: var(--pink); font-weight: 700; font-size: 1rem; }

    /* Parent panel */
    #parent-screen {
      overflow-y: auto;
      justify-content: flex-start;
      gap: 14px;
      padding-bottom: 30px;
    }
    .parent-card {
      background: var(--card);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: var(--radius);
      padding: 20px;
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 12px;
      backdrop-filter: blur(8px);
    }
    .parent-section-title {
      font-size: 0.8rem;
      font-weight: 900;
      color: rgba(255,255,255,0.5);
      text-transform: uppercase;
      letter-spacing: 2px;
    }
    .parent-input {
      background: rgba(255,255,255,0.08);
      border: 1.5px solid rgba(255,255,255,0.2);
      border-radius: 14px;
      color: white;
      font-family: 'Nunito', sans-serif;
      font-size: 1.1rem;
      font-weight: 700;
      padding: 13px 16px;
      outline: none;
      width: 100%;
      transition: border-color 0.2s;
    }
    .parent-input::placeholder { color: rgba(255,255,255,0.25); }
    .parent-input:focus { border-color: var(--purple); }
    .add-word-btn {
      background: linear-gradient(135deg, var(--purple), var(--pink));
      border: none; border-radius: 14px;
      color: white;
      font-family: 'Nunito', sans-serif;
      font-size: 1rem; font-weight: 900;
      padding: 13px;
      cursor: pointer;
      transition: transform 0.15s;
    }
    .add-word-btn:hover { transform: translateY(-2px); }
    .word-item {
      display: flex; align-items: center;
      justify-content: space-between;
      padding: 12px 14px;
      background: rgba(255,255,255,0.06);
      border-radius: 14px;
      gap: 10px;
    }
    .word-item-word { font-size: 1.2rem; font-weight: 900; color: white; }
    .delete-btn {
      background: rgba(255,107,179,0.12);
      border: 1px solid rgba(255,107,179,0.3);
      border-radius: 8px;
      color: var(--pink);
      cursor: pointer;
      font-size: 1rem;
      padding: 7px 12px;
      transition: background 0.15s;
      flex-shrink: 0;
    }
    .delete-btn:hover { background: rgba(255,107,179,0.3); }
    .empty-devoirs { color: rgba(255,255,255,0.35); text-align: center; padding: 16px; font-style: italic; }
    #word-list { max-height: 45vh; overflow-y: auto; }

    /* Devoirs screen (Caly) */
    .devoir-mot {
      font-size: clamp(3rem, 15vw, 5.5rem);
      font-weight: 900;
      color: white;
      text-align: center;
      letter-spacing: 2px;
      text-shadow: 0 0 30px rgba(107,232,255,0.4);
      animation: slideInMot 0.35s ease;
    }

    /* ===== MODE EXERCICE ===== */
    .op-btn.exo { background: linear-gradient(135deg, #6bff9e, #00e57a); color: #003320; }

    .exo-question {
      font-size: 1.3rem;
      color: rgba(255,255,255,0.75);
      font-weight: 700;
      text-align: center;
    }
    /* Lettre blanche pour masquer les couleurs dans l'exercice */
    .lettre.s0 { color: white; }
    .exo-btns { display: flex; gap: 16px; justify-content: center; }
    .exo-btn {
      background: rgba(255,255,255,0.1);
      border: 2px solid rgba(255,255,255,0.25);
      border-radius: 20px;
      color: white;
      font-family: 'Nunito', sans-serif;
      font-size: 2rem;
      font-weight: 900;
      width: 72px; height: 72px;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }
    .exo-btn:hover  { background: rgba(255,255,255,0.2); transform: scale(1.05); }
    .exo-btn:active { transform: scale(0.92); }
    .exo-btn.correct { background: var(--green); border-color: var(--green); color: #003322; }
    .exo-btn.wrong   { background: var(--pink);  border-color: var(--pink);  color: white; }
    .exo-btn:disabled { cursor: default; }
    .lecture-tip.correct { color: var(--green); font-weight: 900; }
    .lecture-tip.wrong   { color: var(--pink);  font-weight: 900; }
  </style>
</head>
<body>

<div id="stars"></div>

<span class="floatie" style="top:8%;left:5%;--fd:3.2s">🦄</span>
<span class="floatie" style="top:15%;right:6%;--fd:2.7s">✨</span>
<span class="floatie" style="bottom:12%;left:8%;--fd:4s">⭐</span>
<span class="floatie" style="bottom:20%;right:5%;--fd:3.5s">🌟</span>
<span class="floatie" style="top:45%;left:2%;--fd:2.9s">💫</span>
<span class="floatie" style="top:60%;right:3%;--fd:3.8s">🦄</span>

<div id="app">

  <!-- Écran 1 : Accueil -->
  <div id="home-screen" class="screen active">
    <div class="title">Les Jeux<br>de Caly 🦄</div>
    <div class="subtitle">Choisis une activité ✨</div>
    <div class="btn-group">
      <button class="op-btn add" onclick="startGame('add')">
        <span class="op-icon">🌸</span>
        <span class="op-label">Addition</span>
        <span class="op-sym">+</span>
      </button>
      <button class="op-btn sub" onclick="startGame('sub')">
        <span class="op-icon">🔮</span>
        <span class="op-label">Soustraction</span>
        <span class="op-sym">−</span>
      </button>
      <button class="op-btn mul" onclick="startGame('mul')">
        <span class="op-icon">⭐</span>
        <span class="op-label">Multiplication</span>
        <span class="op-sym">×</span>
      </button>
      <button class="op-btn lec" onclick="startLecture()">
        <span class="op-icon">📖</span>
        <span class="op-label">Lecture</span>
        <span class="op-sym">A</span>
      </button>
      <button class="op-btn exo" onclick="startExercice()">
        <span class="op-icon">🎯</span>
        <span class="op-label">Exercice syllabes</span>
        <span class="op-sym">?</span>
      </button>
      <button class="op-btn dev" id="devoirs-btn" onclick="startDevoirs()" style="display:none">
        <span class="op-icon">📚</span>
        <span class="op-label">Devoirs</span>
        <span class="op-sym">NL</span>
      </button>
    </div>
    <button class="parent-unlock" onclick="ouvrirParent()">🔒 Espace parent</button>
  </div>

  <!-- Écran 2 : Jeu -->
  <div id="game-screen" class="screen">
    <div class="score-bar">
      <button class="back-btn" onclick="goHome()">← Retour</button>
      <div id="score-stars" class="stars">Score : 0</div>
    </div>
    <div class="dots" id="progress-dots"></div>
    <div class="problem-card">
      <div id="op-badge" class="op-badge"></div>
      <div id="problem-text" class="problem-text"></div>
      <div id="feedback"></div>
      <input id="answer-input" type="number" inputmode="numeric" placeholder="?" autocomplete="off" />
      <div class="keypad">
        <button class="key" onclick="keyPress('7')">7</button>
        <button class="key" onclick="keyPress('8')">8</button>
        <button class="key" onclick="keyPress('9')">9</button>
        <button class="key" onclick="keyPress('4')">4</button>
        <button class="key" onclick="keyPress('5')">5</button>
        <button class="key" onclick="keyPress('6')">6</button>
        <button class="key" onclick="keyPress('1')">1</button>
        <button class="key" onclick="keyPress('2')">2</button>
        <button class="key" onclick="keyPress('3')">3</button>
        <button class="key" onclick="keyPress('0')">0</button>
        <button class="key del" onclick="keyDel()">⌫</button>
        <button class="key ok"  onclick="checkAnswer()">✓</button>
      </div>
    </div>
  </div>

  <!-- Écran 4 : Lecture -->
  <div id="lecture-screen" class="screen">
    <div class="score-bar">
      <button class="back-btn" onclick="goHome()">← Retour</button>
      <div id="lec-progress" class="lec-progress">Mot 1 / 25</div>
    </div>
    <div class="lecture-card">
      <div class="lecture-legende">
        <span><b style="color:var(--pink)">rose</b>/<b style="color:var(--blue)">bleu</b> = syllabe</span>
        <span><span class="leg-arc"></span> = un son</span>
        <span><span class="leg-muette"></span> = muette</span>
      </div>
      <div id="mot-display" class="mot-display"></div>
      <button class="listen-btn" onclick="ecouterMot()">🔊 Écouter</button>
      <div id="lecture-tip" class="lecture-tip"></div>
      <button class="lu-btn" id="lu-btn" onclick="nextMot()">Lu ! →</button>
    </div>
  </div>

  <!-- Écran 5 : Exercice Syllabes -->
  <div id="exercice-screen" class="screen">
    <div class="score-bar">
      <button class="back-btn" onclick="goHome()">← Retour</button>
      <div id="exo-score" class="lec-progress">Score : 0</div>
    </div>
    <div class="dots" id="exo-dots"></div>
    <div class="lecture-card">
      <div class="exo-question">Combien de syllabes ? 🔤</div>
      <div id="exo-mot" class="mot-display"></div>
      <div id="exo-feedback" class="lecture-tip" style="min-height:52px;text-align:center"></div>
      <div class="exo-btns">
        <button class="exo-btn" onclick="repondre(1)">1</button>
        <button class="exo-btn" onclick="repondre(2)">2</button>
        <button class="exo-btn" onclick="repondre(3)">3</button>
      </div>
    </div>
  </div>

  <!-- Écran PIN -->
  <div id="pin-screen" class="screen">
    <div class="title" id="pin-title" style="font-size:1.8rem">Code parent 🔒</div>
    <div class="pin-dots">
      <div class="pin-dot"></div>
      <div class="pin-dot"></div>
      <div class="pin-dot"></div>
      <div class="pin-dot"></div>
    </div>
    <div id="pin-error"></div>
    <div class="keypad">
      <button class="key" onclick="pinPress('7')">7</button>
      <button class="key" onclick="pinPress('8')">8</button>
      <button class="key" onclick="pinPress('9')">9</button>
      <button class="key" onclick="pinPress('4')">4</button>
      <button class="key" onclick="pinPress('5')">5</button>
      <button class="key" onclick="pinPress('6')">6</button>
      <button class="key" onclick="pinPress('1')">1</button>
      <button class="key" onclick="pinPress('2')">2</button>
      <button class="key" onclick="pinPress('3')">3</button>
      <button class="key" onclick="goHome()">✕</button>
      <button class="key" onclick="pinPress('0')">0</button>
      <button class="key del" onclick="pinDel()">⌫</button>
    </div>
  </div>

  <!-- Écran Parent -->
  <div id="parent-screen" class="screen">
    <div class="score-bar">
      <button class="back-btn" onclick="goHome()">← Retour</button>
      <div style="color:white;font-weight:900;font-size:1rem">👨‍👩‍👧 Espace parent</div>
    </div>
    <div class="parent-card">
      <div class="parent-section-title">Ajouter un mot</div>
      <input id="new-word" class="parent-input" type="text" placeholder="Mot en néerlandais..."
             onkeydown="if(event.key==='Enter') ajouterDevoir()" />
      <button class="add-word-btn" onclick="ajouterDevoir()">+ Ajouter</button>
    </div>
    <div class="parent-card">
      <div class="parent-section-title">Mots des devoirs</div>
      <div id="word-list"></div>
    </div>
    <div class="parent-card" style="gap:8px">
      <div class="parent-section-title">Sécurité</div>
      <button class="back-btn" style="width:100%;text-align:center" onclick="changerCode()">🔑 Changer le code PIN</button>
    </div>
  </div>

  <!-- Écran Devoirs (Caly) -->
  <div id="devoirs-screen" class="screen">
    <div class="score-bar">
      <button class="back-btn" onclick="goHome()">← Retour</button>
      <div id="dev-progress" class="lec-progress">Mot 1 / 5</div>
    </div>
    <div class="lecture-card" style="gap:28px">
      <div id="dev-mot" class="devoir-mot"></div>
      <button class="listen-btn" onclick="ecouterDevoir()">🔊 Écouter</button>
      <button class="lu-btn" id="dev-btn" onclick="nextDevoir()">Lu ! →</button>
    </div>
  </div>

  <!-- Écran 3 : Résultat -->
  <div id="result-screen" class="screen">
    <div id="result-emoji" class="result-emoji"></div>
    <div id="result-title" class="result-title"></div>
    <div id="star-row" class="star-row"></div>
    <div id="result-score" class="result-score"></div>
    <button class="replay-btn" onclick="replay()">🔄 Rejouer !</button>
    <button class="back-btn" onclick="goHome()">🏠 Menu principal</button>
  </div>

</div>

<script>
  // Init
  document.addEventListener('DOMContentLoaded', function() { updateDevoirsButton(); });

  // Étoiles de fond
  const starsEl = document.getElementById('stars');
  for (let i = 0; i < 120; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random() * 3 + 1;
    s.style.cssText = `width:${size}px;height:${size}px;top:${Math.random()*100}%;left:${Math.random()*100}%;--d:${(Math.random()*3+1).toFixed(1)}s;animation-delay:${(Math.random()*4).toFixed(1)}s`;
    starsEl.appendChild(s);
  }

  const TOTAL    = 10;
  const ADD_MAX  = 20;  // additions jusqu'à 20+20
  const SUB_MAX  = 10;  // soustractions dans les 10

  let currentOp = '';
  let questions = [];
  let current   = 0;
  let score     = 0;
  let answered  = [];

  function rand(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

  function genQuestion(op) {
    let a, b, answer, sym;
    if (op === 'add') {
      a = rand(1, ADD_MAX); b = rand(1, ADD_MAX);
      answer = a + b; sym = '+';
    } else if (op === 'sub') {
      a = rand(1, SUB_MAX); b = rand(0, a);
      answer = a - b; sym = '−';
    } else {
      a = rand(1, 9);
      b = 10;
      answer = a * b; sym = '×';
    }
    return { a, b, answer, sym };
  }

  function startGame(op) {
    currentOp = op;
    questions = Array.from({ length: TOTAL }, () => genQuestion(op));
    current   = 0;
    score     = 0;
    answered  = Array(TOTAL).fill(null);
    showScreen('game-screen');
    renderDots();
    loadQuestion();
  }

  function loadQuestion() {
    const q   = questions[current];
    const inp = document.getElementById('answer-input');
    const fb  = document.getElementById('feedback');
    inp.value = ''; inp.className = ''; inp.disabled = false;
    fb.textContent = ''; fb.className = '';

    const badge  = document.getElementById('op-badge');
    const labels = { add: '➕ Addition', sub: '➖ Soustraction', mul: '✖️ Multiplication' };
    badge.textContent = labels[currentOp];
    badge.className   = `op-badge ${currentOp}`;

    document.getElementById('problem-text').innerHTML =
      `${q.a} ${q.sym} ${q.b} = <span class="question-mark">?</span>`;

    updateScore();
    renderDots();
    inp.focus();
  }

  function keyPress(digit) {
    const inp = document.getElementById('answer-input');
    if (inp.disabled || inp.value.length >= 4) return;
    inp.value += digit;
  }
  function keyDel() {
    const inp = document.getElementById('answer-input');
    if (!inp.disabled) inp.value = inp.value.slice(0, -1);
  }

  function checkAnswer() {
    const inp = document.getElementById('answer-input');
    const fb  = document.getElementById('feedback');
    if (inp.disabled || inp.value === '') return;
    const val = parseInt(inp.value, 10);
    const q   = questions[current];
    inp.disabled = true;

    if (val === q.answer) {
      inp.classList.add('correct');
      score++;
      answered[current] = 'correct';
      const msg = pick(['Bravo !', 'Super !', 'Excellent !', 'Parfait !', 'Génial !']);
      fb.textContent = msg + ' 🌟';
      fb.className = 'correct';
      confetti();
      speak(msg);
    } else {
      inp.classList.add('wrong');
      answered[current] = 'wrong';
      fb.textContent = `Presque... La réponse était ${q.answer} 💜`;
      fb.className = 'wrong';
      speak('Presque. La réponse était ' + q.answer);
    }

    renderDots();
    updateScore();
    setTimeout(() => { current++; if (current < TOTAL) loadQuestion(); else showResult(); }, 1400);
  }

  document.addEventListener('keydown', e => {
    if (document.getElementById('game-screen').classList.contains('active') && e.key === 'Enter')
      checkAnswer();
  });

  function renderDots() {
    const el = document.getElementById('progress-dots');
    el.innerHTML = '';
    for (let i = 0; i < TOTAL; i++) {
      const d = document.createElement('div');
      d.className = 'dot' +
        (answered[i] === 'correct' ? ' done'    :
         answered[i] === 'wrong'   ? ' wrong-d' :
         i === current             ? ' current' : '');
      if (answered[i] === 'correct') d.textContent = '✓';
      el.appendChild(d);
    }
  }

  function updateScore() {
    document.getElementById('score-stars').textContent = `Score : ${score}`;
  }

  function showResult() {
    showScreen('result-screen');
    const pct = score / TOTAL;
    let emoji, title, sub;
    if (pct === 1)       { emoji = '🏆'; title = 'PARFAIT ! Caly est une championne !'; sub = 'Score parfait ! Incroyable ! 🎉'; }
    else if (pct >= 0.8) { emoji = '🦄'; title = 'Excellent travail, Caly !';           sub = 'Encore un peu et tu auras tout juste !'; }
    else if (pct >= 0.6) { emoji = '🌟'; title = 'Très bien, continue comme ça !';       sub = 'Tu progresses super bien !'; }
    else if (pct >= 0.4) { emoji = '💪'; title = 'Bon effort, tu progresses !';          sub = 'Rejoue pour t\'améliorer !'; }
    else                  { emoji = '💜'; title = 'Pratique encore, tu vas y arriver !';  sub = 'Chaque essai compte !'; }
    document.getElementById('result-emoji').textContent = emoji;
    document.getElementById('result-title').textContent  = title;
    document.getElementById('star-row').textContent      = score + ' / ' + TOTAL;
    document.getElementById('result-score').textContent  = sub;
    if (pct >= 0.8) confetti(80);
    setTimeout(function() { speak(title + '. ' + sub); }, 600);
  }

  function replay() {
    if      (currentOp === 'exo') startExercice();
    else if (currentOp === 'lec') startLecture();
    else                          startGame(currentOp);
  }
  function goHome()  { showScreen('home-screen'); updateDevoirsButton(); }

  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

  // ===== ESPACE PARENT =====
  var PIN_KEY     = 'caly-pin';
  var DEVOIRS_KEY = 'caly-devoirs';
  var pinBuffer   = '';
  var pinMode     = 'access'; // 'access' ou 'change'

  function getPin()      { return localStorage.getItem(PIN_KEY) || '1234'; }
  function getDevoirs()  { try { return JSON.parse(localStorage.getItem(DEVOIRS_KEY) || '[]'); } catch(e) { return []; } }
  function saveDevoirs(d){ localStorage.setItem(DEVOIRS_KEY, JSON.stringify(d)); }

  function ouvrirParent() {
    pinBuffer = ''; pinMode = 'access';
    document.getElementById('pin-title').textContent = 'Code parent 🔒';
    document.getElementById('pin-error').textContent = '';
    renderPinDots();
    showScreen('pin-screen');
  }

  function changerCode() {
    pinBuffer = ''; pinMode = 'change';
    document.getElementById('pin-title').textContent = 'Nouveau code 🔑';
    document.getElementById('pin-error').textContent = 'Choisissez 4 chiffres';
    renderPinDots();
    showScreen('pin-screen');
  }

  function pinPress(d) {
    if (pinBuffer.length >= 4) return;
    pinBuffer += d;
    renderPinDots();
    if (pinBuffer.length === 4) setTimeout(validatePin, 250);
  }

  function pinDel() {
    pinBuffer = pinBuffer.slice(0, -1);
    renderPinDots();
  }

  function renderPinDots() {
    document.querySelectorAll('.pin-dot').forEach(function(dot, i) {
      dot.classList.toggle('filled', i < pinBuffer.length);
    });
  }

  function validatePin() {
    if (pinMode === 'access') {
      if (pinBuffer === getPin()) {
        renderParentPanel();
        showScreen('parent-screen');
      } else {
        document.getElementById('pin-error').textContent = 'Code incorrect ❌';
        speak('Code incorrect');
        pinBuffer = '';
        renderPinDots();
      }
    } else {
      localStorage.setItem(PIN_KEY, pinBuffer);
      document.getElementById('pin-error').textContent = '';
      renderParentPanel();
      showScreen('parent-screen');
    }
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function renderParentPanel() {
    var devoirs = getDevoirs();
    var list    = document.getElementById('word-list');
    if (devoirs.length === 0) {
      list.innerHTML = '<div class="empty-devoirs">Aucun mot pour l\'instant</div>';
      return;
    }
    list.innerHTML = devoirs.map(function(d, i) {
      return '<div class="word-item">' +
        '<span class="word-item-word">' + escHtml(d.word) + '</span>' +
        '<button class="delete-btn" onclick="supprimerDevoir(' + i + ')">✕</button>' +
      '</div>';
    }).join('');
  }

  function ajouterDevoir() {
    var inp  = document.getElementById('new-word');
    var word = inp.value.trim();
    if (!word) return;
    var devoirs = getDevoirs();
    devoirs.push({ word: word });
    saveDevoirs(devoirs);
    inp.value = '';
    inp.focus();
    renderParentPanel();
    updateDevoirsButton();
    var wl = document.getElementById('word-list');
    if (wl) wl.scrollTop = wl.scrollHeight;
  }

  function supprimerDevoir(idx) {
    var devoirs = getDevoirs();
    devoirs.splice(idx, 1);
    saveDevoirs(devoirs);
    renderParentPanel();
    updateDevoirsButton();
  }

  function updateDevoirsButton() {
    var btn = document.getElementById('devoirs-btn');
    if (btn) btn.style.display = getDevoirs().length > 0 ? 'flex' : 'none';
  }

  // ===== DEVOIRS (côté Caly) =====
  var devoirsIdx  = 0;
  var devoirsList = [];

  function startDevoirs() {
    devoirsList = getDevoirs();
    if (!devoirsList.length) return;
    devoirsIdx = 0;
    showScreen('devoirs-screen');
    afficherDevoir();
  }

  function afficherDevoir() {
    var d = devoirsList[devoirsIdx];
    document.getElementById('dev-progress').textContent =
      'Mot ' + (devoirsIdx + 1) + ' / ' + devoirsList.length;
    document.getElementById('dev-mot').textContent = d.word;
    var btn = document.getElementById('dev-btn');
    btn.disabled = false;
    btn.textContent = devoirsIdx < devoirsList.length - 1 ? 'Lu ! →' : 'Terminé ! 🎉';
  }

  function ecouterDevoir() {
    var d = devoirsList[devoirsIdx];
    if (!d || !window.speechSynthesis) return;
    window.speechSynthesis.cancel();
    var utt   = new SpeechSynthesisUtterance(d.word);
    utt.lang  = 'nl-NL';
    utt.rate  = 0.75;
    utt.pitch = 1.0;
    window.speechSynthesis.speak(utt);
  }

  function nextDevoir() {
    var d = devoirsList[devoirsIdx];
    var isLast = devoirsIdx >= devoirsList.length - 1;
    var btn = document.getElementById('dev-btn');
    btn.disabled = true;

    function passerSuivant() {
      if (!isLast) {
        devoirsIdx++;
        afficherDevoir();
      } else {
        confetti(60);
        goHome();
      }
    }

    if (!d || !window.speechSynthesis) {
      passerSuivant();
      return;
    }

    // Prononce le mot, puis passe au suivant
    window.speechSynthesis.cancel();
    var utt   = new SpeechSynthesisUtterance(d.word);
    utt.lang  = 'nl-NL';
    utt.rate  = 0.75;
    utt.pitch = 1.0;
    utt.onend = passerSuivant;
    utt.onerror = passerSuivant;
    window.speechSynthesis.speak(utt);
  }

  // ===== VOIX =====
  function speak(text, rate) {
    if (!window.speechSynthesis) return;
    window.speechSynthesis.cancel();
    // Supprime les emojis pour une lecture propre
    var clean = text.replace(/[\u{1F000}-\u{1FFFF}]|[\u{2600}-\u{27BF}]/gu, '').trim();
    var utt   = new SpeechSynthesisUtterance(clean);
    utt.lang  = 'fr-FR';
    utt.rate  = rate  || 0.88;
    utt.pitch = 1.1;
    window.speechSynthesis.speak(utt);
  }

  // ===== LECTURE =====
  // s = syllabe (1=rose, 2=bleu, 3=jaune), a = arc, m = muette
  const MOTS = [
    {p:[{l:"ch",a:1,s:1},{l:"a",s:1},{l:"t",m:1,s:1}],                                     i:'"ch" = un seul son. Le "t" final ne se prononce pas.'},
    {p:[{l:"ch",a:1,s:1},{l:"i",s:1},{l:"en",a:1,s:1}],                                    i:'"ch" et "en" font chacun un seul son.'},
    {p:[{l:"ch",a:1,s:1},{l:"a",s:1},{l:"p",s:2},{l:"eau",a:1,s:2}],                       i:'"ch" et "eau" font chacun un seul son.'},
    {p:[{l:"b",s:1},{l:"a",s:1},{l:"t",s:2},{l:"eau",a:1,s:2}],                            i:'"eau" se prononce "o".'},
    {p:[{l:"g",s:1},{l:"â",s:1},{l:"t",s:2},{l:"eau",a:1,s:2}],                            i:'"eau" se prononce "o".'},
    {p:[{l:"m",s:1},{l:"ou",a:1,s:1},{l:"t",s:2},{l:"on",a:1,s:2}],                        i:'"ou" et "on" font chacun un seul son.'},
    {p:[{l:"h",m:1,s:1},{l:"i",s:1},{l:"b",s:2},{l:"ou",a:1,s:2}],                         i:'Le "h" est muet. "ou" fait un seul son.'},
    {p:[{l:"l",s:1},{l:"ou",a:1,s:1},{l:"p",m:1,s:1}],                                     i:'"ou" fait un seul son. Le "p" final est muet.'},
    {p:[{l:"l",s:1},{l:"a",s:1},{l:"p",s:2},{l:"in",a:1,s:2}],                             i:'"in" fait un son du nez.'},
    {p:[{l:"m",s:1},{l:"a",s:1},{l:"m",s:2},{l:"an",a:1,s:2}],                             i:'"an" fait un son du nez.'},
    {p:[{l:"en",a:1,s:1},{l:"f",s:2},{l:"an",a:1,s:2},{l:"t",m:1,s:2}],                    i:'"en" et "an" sont des sons du nez. Le "t" est muet.'},
    {p:[{l:"b",s:1},{l:"on",a:1,s:1},{l:"b",s:2},{l:"on",a:1,s:2}],                        i:'"on" fait un son du nez.'},
    {p:[{l:"m",s:1},{l:"ai",a:1,s:1},{l:"s",s:2},{l:"on",a:1,s:2}],                        i:'"ai" se prononce "è". "on" fait un son du nez.'},
    {p:[{l:"p",s:1},{l:"oi",a:1,s:1},{l:"ss",s:2},{l:"on",a:1,s:2}],                       i:'"oi" et "on" font chacun un seul son.'},
    {p:[{l:"v",s:1},{l:"oi",a:1,s:1},{l:"t",s:2},{l:"u",s:2},{l:"r",s:2},{l:"e",m:1,s:2}],i:'"oi" fait un seul son. Le "e" final ne se prononce pas.'},
    {p:[{l:"p",s:1},{l:"a",s:1},{l:"p",s:2},{l:"ill",a:1,s:2},{l:"on",a:1,s:3}],           i:'"ill" se prononce "y". "on" fait un son du nez.'},

    catch(e) {}
  }
  function getMotKey(mot) {
    return mot.p.map(function(p) { return p.l; }).join('');
  }

  function buildLectureSession() {
    var seenKeys = getSeenKeys();
    var unseen   = MOTS.filter(function(m) { return seenKeys.indexOf(getMotKey(m)) === -1; });
    var seen     = MOTS.filter(function(m) { return seenKeys.indexOf(getMotKey(m)) !== -1; });

    // Tous les mots ont ete vus : on repart de zero
    if (unseen.length === 0) {
      saveSeenKeys([]);
      unseen = MOTS.slice();
      seen   = [];
    }

    // Melange
    unseen = unseen.sort(function() { return Math.random() - 0.5; });
    seen   = seen.sort(function()   { return Math.random() - 0.5; });

    // Toujours 2 mots de revision si possible, reste en nouveaux
    var revCount  = Math.min(2, seen.length);
    var newCount  = Math.min(SESSION_SIZE - revCount, unseen.length);
    revCount      = Math.min(SESSION_SIZE - newCount, seen.length); // ajuste si peu de nouveaux

    var session = unseen.slice(0, newCount).concat(seen.slice(0, revCount));
    return session.sort(function() { return Math.random() - 0.5; });
  }

  function startLecture() {
    lectureMots = buildLectureSession();
    lectureIdx  = 0;
    showScreen('lecture-screen');
    afficherMot();
  }

  function afficherMot() {
    var mot      = lectureMots[lectureIdx];
    var seenNow  = getSeenKeys().length;

    document.getElementById('lec-progress').textContent =
      'Mot ' + (lectureIdx + 1) + '/' + lectureMots.length + ' · ' + seenNow + '/' + MOTS.length + ' 📚';
    document.getElementById('lecture-tip').textContent  = mot.i;

    const display = document.getElementById('mot-display');
    // Reset l'animation
    display.style.animation = 'none';
    display.offsetHeight;
    display.style.animation = '';

    display.innerHTML = mot.p.map(function(part) {
      var cls = 'lettre s' + (part.s || 1);
      if (part.a) cls += ' arc';
      if (part.m) cls += ' muette';
      return '<span class="' + cls + '">' + part.l + '</span>';
    }).join('');

    var btn = document.getElementById('lu-btn');
    btn.textContent = lectureIdx < lectureMots.length - 1 ? 'Lu ! →' : 'Terminé ! 🎉';
  }

  function ecouterMot() {
    var mot    = lectureMots[lectureIdx];
    var texte  = mot.p.map(function(p) { return p.l; }).join('');
    speak(texte, 0.7); // lentement pour bien entendre
  }

  function nextMot() {
    confetti(12);
    if (lectureIdx < lectureMots.length - 1) {
      lectureIdx++;
      afficherMot();
    } else {
      // Session terminee : on marque les mots comme vus
      var seenKeys = getSeenKeys();
      lectureMots.forEach(function(m) {
        var key = getMotKey(m);
        if (seenKeys.indexOf(key) === -1) seenKeys.push(key);
      });
      saveSeenKeys(seenKeys);
      var total = seenKeys.length;
      confetti(60);
      // Message de fin de session
      showScreen('result-screen');
      document.getElementById('result-emoji').textContent = total >= MOTS.length ? '🏆' : '📖';
      document.getElementById('result-title').textContent =
        total >= MOTS.length ? 'Tous les mots appris ! Bravo !' : 'Session terminée !';
      document.getElementById('star-row').textContent     = total + ' / ' + MOTS.length;
      document.getElementById('result-score').textContent = 'mots appris au total';
      currentOp = 'lec';
      var msg = total >= MOTS.length
        ? 'Félicitations ! Tu as appris tous les mots !'
        : 'Super ! Tu as appris ' + total + ' mots sur ' + MOTS.length + ' au total.';
      setTimeout(function() { speak(msg); }, 600);
      if (total >= MOTS.length) confetti(100);
    }
  }

  // ===== MODE EXERCICE : Compter les syllabes =====
  var EXO_TOTAL   = 10;
  var exoWords    = [];
  var exoIdx      = 0;
  var exoScore    = 0;
  var exoAnswered = [];
  var exoWaiting  = false;

  function getSyllabeCount(mot) {
    return Math.max.apply(null, mot.p.map(function(p) { return p.s || 1; }));
  }

  function startExercice() {
    exoWords    = MOTS.slice().sort(function() { return Math.random() - 0.5; }).slice(0, EXO_TOTAL);
    exoIdx      = 0;
    exoScore    = 0;
    exoAnswered = Array(EXO_TOTAL).fill(null);
    exoWaiting  = false;
    currentOp   = 'exo';
    showScreen('exercice-screen');
    afficherExo();
  }

  function afficherExo() {
    var mot     = exoWords[exoIdx];
    var display = document.getElementById('exo-mot');
    display.style.animation = 'none';
    display.offsetHeight;
    display.style.animation = '';
    // Mot en blanc : masque les couleurs, pas d'arcs visibles
    display.innerHTML = mot.p.map(function(p) {
      return '<span class="lettre s0">' + p.l + '</span>';
    }).join('');

    var fb = document.getElementById('exo-feedback');
    fb.textContent = '';
    fb.className   = 'lecture-tip';
    document.getElementById('exo-score').textContent = 'Score : ' + exoScore;

    var btns = document.querySelectorAll('.exo-btn');
    btns.forEach(function(b) { b.className = 'exo-btn'; b.disabled = false; });

    renderExoDots();
  }

  function repondre(n) {
    if (exoWaiting) return;
    var mot     = exoWords[exoIdx];
    var correct = getSyllabeCount(mot);
    var fb      = document.getElementById('exo-feedback');
    var btns    = document.querySelectorAll('.exo-btn');

    exoWaiting = true;
    btns.forEach(function(b) { b.disabled = true; });

    btns[n - 1].classList.add(n === correct ? 'correct' : 'wrong');
    if (n !== correct) btns[correct - 1].classList.add('correct');

    if (n === correct) {
      exoScore++;
      exoAnswered[exoIdx] = 'correct';
      var msg = pick(['Bravo !', 'Super !', 'Parfait !', 'Excellent !']);
      fb.textContent = msg + ' 🌟';
      fb.className   = 'lecture-tip correct';
      confetti(15);
      speak(msg);
    } else {
      exoAnswered[exoIdx] = 'wrong';
      var motTexte = mot.p.map(function(p) { return p.l; }).join('');
      fb.textContent = correct + ' syllabe' + (correct > 1 ? 's' : '') + ' → ' + motTexte;
      fb.className   = 'lecture-tip wrong';
      speak('Il y a ' + correct + ' syllabe' + (correct > 1 ? 's' : ''));
    }

    document.getElementById('exo-score').textContent = 'Score : ' + exoScore;
    renderExoDots();

    // Revele les couleurs apres 500ms
    setTimeout(function() {
      var disp = document.getElementById('exo-mot');
      disp.innerHTML = mot.p.map(function(p) {
        var cls = 'lettre s' + (p.s || 1);
        if (p.a) cls += ' arc';
        if (p.m) cls += ' muette';
        return '<span class="' + cls + '">' + p.l + '</span>';
      }).join('');
    }, 500);

    setTimeout(function() {
      exoIdx++;
      exoWaiting = false;
      if (exoIdx < EXO_TOTAL) afficherExo();
      else showExoResult();
    }, 2200);
  }

  function renderExoDots() {
    var el = document.getElementById('exo-dots');
    el.innerHTML = '';
    for (var i = 0; i < EXO_TOTAL; i++) {
      var d = document.createElement('div');
      d.className = 'dot' +
        (exoAnswered[i] === 'correct' ? ' done'    :
         exoAnswered[i] === 'wrong'   ? ' wrong-d' :
         i === exoIdx                ? ' current' : '');
      if (exoAnswered[i] === 'correct') d.textContent = '✓';
      el.appendChild(d);
    }
  }

  function showExoResult() {
    showScreen('result-screen');
    var pct = exoScore / EXO_TOTAL;
    var emoji, title, stars;
    if      (pct === 1)  { emoji = '🏆'; title = 'PARFAIT ! Caly est une championne !'; stars = '⭐⭐⭐'; }
    else if (pct >= 0.8) { emoji = '🦄'; title = 'Excellent travail, Caly !';           stars = '⭐⭐⭐'; }
    else if (pct >= 0.6) { emoji = '🌟'; title = 'Très bien, continue comme ça !';       stars = '⭐⭐'; }
    else if (pct >= 0.4) { emoji = '💪'; title = 'Bon effort, tu progresses !';          stars = '⭐'; }
    else                  { emoji = '💜'; title = 'Pratique encore, tu vas y arriver !';  stars = ''; }
    var sub;
    if      (pct === 1)  sub = 'Score parfait ! Incroyable ! 🎉';
    else if (pct >= 0.8) sub = 'Encore un peu et tu auras tout juste !';
    else if (pct >= 0.6) sub = 'Tu progresses super bien !';
    else if (pct >= 0.4) sub = 'Rejoue pour t\'améliorer !';
    else                  sub = 'Chaque essai compte !';
    document.getElementById('result-emoji').textContent = emoji;
    document.getElementById('result-title').textContent  = title;
    document.getElementById('star-row').textContent      = exoScore + ' / ' + EXO_TOTAL;
    document.getElementById('result-score').textContent  = sub;
    if (pct >= 0.8) confetti(80);
    setTimeout(function() { speak(title + '. ' + sub); }, 600);
  }

  function confetti(n = 40) {
    const colors = ['#ff6fb3','#b36bff','#6bbfff','#ffe066','#6bffb3','#ff9de0'];
    for (let i = 0; i < n; i++) {
      setTimeout(() => {
        const p = document.createElement('div');
        p.className = 'confetti-piece';
        p.style.cssText = `left:${Math.random()*100}vw;background:${colors[~~(Math.random()*colors.length)]};--ct:${(Math.random()*2+1).toFixed(1)}s;animation-delay:${(Math.random()*0.5).toFixed(2)}s`;
        document.body.appendChild(p);
        setTimeout(() => p.remove(), 3500);
      }, i * 20);
    }
  }
</script>
